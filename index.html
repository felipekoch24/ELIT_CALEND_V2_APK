<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Calendar - Felipe</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --gold: #FFB300;
            --green: #39ff14;
            --red: #ff4444;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .proximo-card {
            background: var(--card);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 179, 0, 0.2);
        }

        .frase-destaque {
            font-style: italic;
            color: #ccc;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .lista-eventos {
            background: var(--card);
            border-radius: 10px;
            padding: 5px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
        }

        .evento {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }

        .tipo-feriado { color: var(--red); font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .tipo-niver { color: var(--gold); font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .dias-faltam { color: var(--green); font-weight: bold; }

        #tela-especial {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        img, video { width: 100%; max-width: 350px; border-radius: 10px; border: 2px solid var(--gold); }
    </style>
</head>
